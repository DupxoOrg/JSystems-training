name: '01 - Building Blocks v 1.1'
on: 
  workflow_dispatch:
jobs:

  echo-hello:
    runs-on: ubuntu-latest
    steps:
      - name: "Say Hello"
        run: echo "Hello World!"
      - name: "Create a file"
        run: echo "This is a file created by the workflow" > file.txt
      - name: "List files"
        run: ls -la

  echo-goodbye:
    runs-on: ubuntu-latest
    steps:
      - name: "Failed Step"
        run : |
          echo "I will fail"
          echo "I will fail"
          echo "I will fail"
          echo "I will fail"
          echo "I will fail"
          echo "I will fail"
      - name: "Say Goodbye"
        run: echo "Goodbye!"
      - name: "List files"
        run: ls -la