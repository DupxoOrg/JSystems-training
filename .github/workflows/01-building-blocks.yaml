name: '01 - Building Blocks'
on: 
  pull_request:
    branches: [ "main" ]
jobs:
  echo-hello:
    runs-on: ubuntu-latest
    steps:
      - name: "Say Hello"
        run: echo "Hello World!"
  echo-goodbye:
    runs-on: ubuntu-latest
    steps:
      - name: "Failed Step"
        run : |
          echo "I will fail"
          echo "I will fail"
          echo "I will fail"
          echo "I will fail"
          echo "I will fail"
          echo "I will fail"
          exit 1
      - name: "Say Goodbye"
        run: echo "Goodbye!"